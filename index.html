<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PARTY PLAY - DJ KEVIN PRODUCCIONES</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary-color: #e50914; --bg-color: #0a0a0a; --card-bg: #1a1a1a; --text-color: #ffffff; --header-height: 70px; }
        html { scroll-behavior: smooth; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Poppins', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }

        header { height: var(--header-height); padding: 0 5%; background: rgba(0,0,0,0.95); position: fixed; width: 100%; top: 0; z-index: 1000; display: flex; align-items: center; justify-content: space-between; box-sizing: border-box; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .site-logo { max-height: 40px; width: auto; cursor: pointer; }
        
        /* Navegación Escritorio */
        nav.desktop-nav { display: flex; gap: 15px; }
        nav a { color: white; text-decoration: none; font-size: 0.75rem; font-weight: 600; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        nav a:hover { color: var(--primary-color); }

        /* NAVEGACIÓN MÓVIL (CENTRADA ENCIMA DEL BUSCADOR) */
        .mobile-nav-container { display: none; padding: 100px 10px 10px 10px; justify-content: center; flex-wrap: wrap; gap: 10px; background: var(--bg-color); }
        .mobile-nav-container a { background: #1a1a1a; color: white; padding: 8px 15px; border-radius: 20px; text-decoration: none; font-size: 0.7rem; font-weight: bold; border: 1px solid #333; text-transform: uppercase; }

        .search-container { text-align: center; margin-top: 20px; margin-bottom: 20px; }
        /* Si no es móvil, el margin-top debe compensar el header */
        @media (min-width: 601px) { .search-container { margin-top: 100px; } }

        .search-bar { width: 85%; max-width: 600px; padding: 15px 25px; border-radius: 30px; border: 1px solid #333; background: #111; color: white; outline: none; }

        .main-slider { width: 90%; max-width: 1200px; height: 400px; margin: 0 auto 40px auto; overflow: hidden; position: relative; border-radius: 15px; }
        .slider-track { display: flex; width: 100%; height: 100%; transition: 0.8s ease; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }

        .container { padding: 0 5% 100px 5%; }
        .category-section { scroll-margin-top: 100px; }
        h2 { margin-top: 50px; font-size: 1.3rem; border-left: 5px solid var(--primary-color); padding-left: 15px; text-transform: uppercase; display: none; }
        
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { position: relative; transition: 0.4s ease; cursor: pointer; border-radius: 10px; overflow: hidden; background: var(--card-bg); display: none; border: 2px solid transparent; }
        .card:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--primary-color); border-color: var(--primary-color); }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .card span { display: block; padding: 10px; font-size: 0.8rem; text-align: center; font-weight: bold; }

        /* PLAYER MODAL */
        .player-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; }
        .player-header { position: absolute; top: 0; width: 100%; padding: 20px; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .player-info { color: white; }
        .player-badge { background: var(--primary-color); padding: 5px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; text-transform: uppercase; }
        .close-btn { background: #fff; color: #000; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        iframe { width: 100%; height: 100%; border: none; }

        @media (max-width: 600px) { 
            .desktop-nav { display: none; }
            .mobile-nav-container { display: flex; }
            .main-slider { height: 200px; width: 95%; }
            .movie-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; }
        }
    </style>
</head>
<body>

<header>
    <img src="https://i.postimg.cc/X7bmMQHY/logo.png" alt="Logo" class="site-logo" onclick="window.scrollTo(0,0)">
    <nav class="desktop-nav">
        <a href="#accion-sec">Acción</a>
        <a href="#terror-sec">Terror</a>
        <a href="#biopic-sec">Biopic</a>
        <a href="#series-sec">Series</a>
        <a href="#party-sec" style="color:#00f2ff;">Party Play</a>
    </nav>
</header>

<div class="mobile-nav-container">
    <a href="#accion-sec">Acción</a>
    <a href="#terror-sec">Terror</a>
    <a href="#biopic-sec">Biopic</a>
    <a href="#series-sec">Series</a>
    <a href="#party-sec">Party Play</a>
</div>

<div class="search-container">
    <input type="text" id="searchInput" class="search-bar" placeholder="Buscar películas, series o música..." onkeyup="filterCards()">
</div>

<div class="main-slider">
    <div class="slider-track" id="sliderTrack"></div>
</div>

<div class="container">
    <div id="ad-top" style="display:none; margin-bottom:40px;"></div>

    <div id="accion-sec" class="category-section"><h2 id="accion-h2">Acción</h2><div class="movie-grid" id="accion-grid"></div></div>
    <div id="terror-sec" class="category-section"><h2 id="terror-h2">Terror</h2><div class="movie-grid" id="terror-grid"></div></div>
    <div id="biopic-sec" class="category-section"><h2 id="biopic-h2">Biopic</h2><div class="movie-grid" id="biopic-grid"></div></div>
    <div id="drama-sec" class="category-section"><h2 id="drama-h2">Drama</h2><div class="movie-grid" id="drama-grid"></div></div>
    <div id="comedia-sec" class="category-section"><h2 id="comedia-h2">Comedia</h2><div class="movie-grid" id="comedia-grid"></div></div>
    <div id="series-sec" class="category-section"><h2 id="series-h2">Series Premium</h2><div class="movie-grid" id="series-grid"></div></div>
    <div id="party-sec" class="category-section"><h2 id="party-play-h2" style="color:#00f2ff; border-left-color:#00f2ff;">🎵 Party Play</h2><div class="movie-grid" id="party-play-grid"></div></div>
</div>

<div id="videoPlayer" class="player-modal">
    <div class="player-header">
        <div class="player-info">
            <span id="playerTag" class="player-badge">MOVIES</span>
            <span id="playerTitle" style="margin-left:10px; font-weight:bold;"></span>
        </div>
        <div class="close-btn" onclick="closePlayer()">CERRAR [X]</div>
    </div>
    <iframe id="videoIframe" allowfullscreen></iframe>
</div>

<script>
    async function loadContent() {
        try {
            const res = await fetch('datos.json');
            const data = await res.json();
            const sliderTrack = document.getElementById('sliderTrack');
            data.forEach(item => {
                if(item.tipo === 'slider') {
                    sliderTrack.innerHTML += `<div class="slide"><img src="${item.img}"></div>`;
                } else if(item.tipo === 'promo') {
                    const adZone = document.getElementById('ad-top');
                    adZone.style.display = 'block';
                    adZone.innerHTML = `<video autoplay muted loop playsinline style="width:100%; border-radius:15px;"><source src="${item.url}" type="video/mp4"></video>`;
                } else {
                    const grid = document.getElementById(item.tipo + '-grid');
                    if(grid) {
                        grid.innerHTML += `<div class="card" data-title="${item.titulo}" data-tipo="${item.tipo}" onclick="openPlayer('${item.url}', '${item.titulo}', '${item.tipo}')" style="display:block"><img src="${item.img}"><span>${item.titulo}</span></div>`;
                        document.getElementById(item.tipo + '-h2').style.display = 'block';
                    }
                }
            });
            startSlider();
        } catch (e) { console.error(e); }
    }

    function openPlayer(url, title, type) {
        document.getElementById('videoIframe').src = url;
        document.getElementById('playerTitle').innerText = title;
        document.getElementById('playerTag').innerText = type.replace('-', ' ');
        document.getElementById('videoPlayer').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function closePlayer() {
        document.getElementById('videoPlayer').style.display = 'none';
        document.getElementById('videoIframe').src = '';
        document.body.style.overflow = 'auto';
    }

    function startSlider() {
        const track = document.getElementById('sliderTrack');
        let index = 0;
        const slides = document.querySelectorAll('.slide');
        if(slides.length > 1) setInterval(() => { index = (index + 1) % slides.length; track.style.transform = `translateX(-${index * 100}%)`; }, 5000);
    }

    function filterCards() {
        let input = document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('.card').forEach(card => {
            card.style.display = card.getAttribute('data-title').toLowerCase().includes(input) ? "block" : "none";
        });
    }
    window.onload = loadContent;
</script>
</body>
</html>
