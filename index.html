<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PARTY PLAY - HOME</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #e50914; --cyber: #00f2ff; --bg: #05070a; }
        body { background: var(--bg); color: #fff; font-family: 'Poppins', sans-serif; margin: 0; }
        
        /* Contenedor Sliders */
        .hero-slider { width: 100%; height: 400px; overflow: hidden; position: relative; display: flex; align-items: center; }
        .slide { min-width: 100%; transition: 0.5s; position: absolute; opacity: 0; }
        .slide.active { opacity: 1; }
        .slide img { width: 100%; height: 400px; object-fit: cover; }

        /* Secciones */
        .section-title { font-family: 'Orbitron'; margin: 20px; color: var(--cyber); border-left: 4px solid var(--primary); padding-left: 15px; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 20px; }
        
        /* Tarjetas */
        .card { background: #111; border-radius: 8px; overflow: hidden; transition: 0.3s; cursor: pointer; border: 1px solid #222; text-decoration: none; color: inherit; }
        .card:hover { transform: scale(1.05); border-color: var(--cyber); }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .card-info { padding: 10px; font-size: 12px; }
        .card-title { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-tags { font-size: 10px; color: #aaa; margin-top: 5px; }
    </style>
</head>
<body>

<div id="slider-container" class="hero-slider"></div>

<h2 class="section-title">SERIES RECIENTES</h2>
<div id="grid-series" class="grid-container"></div>

<h2 class="section-title">PELÍCULAS</h2>
<div id="grid-peliculas" class="grid-container"></div>

<script>
    const JSON_URL = 'datos.json'; // Asegúrate de que el nombre coincida

    async function cargarWeb() {
        try {
            const response = await fetch(JSON_URL);
            const data = await response.json();
            
            const sliderCont = document.getElementById('slider-container');
            const seriesCont = document.getElementById('grid-series');
            const pelisCont = document.getElementById('grid-peliculas');

            data.forEach(item => {
                // 1. Identificar SLIDERS
                if (item.tipo === 'slider') {
                    sliderCont.innerHTML += `
                        <div class="slide">
                            <img src="${item.img}" alt="Banner">
                        </div>`;
                } 
                
                // 2. Identificar SERIES
                else if (item.tipo === 'serie' || (item.url && item.url.includes('serie'))) {
                    seriesCont.innerHTML += crearTarjeta(item);
                } 
                
                // 3. Identificar PELÍCULAS (Por defecto o tipo)
                else {
                    pelisCont.innerHTML += crearTarjeta(item);
                }
            });

            iniciarSlider();

        } catch (error) {
            console.error("Error cargando la web:", error);
        }
    }

    function crearTarjeta(item) {
        // Formatear las etiquetas (tipos) para mostrar en la web
        const etiquetas = item.tipos ? item.tipos.join(' • ') : '';
        
        return `
            <a href="${item.url}" class="card">
                <img src="${item.img}" alt="${item.titulo}">
                <div class="card-info">
                    <div class="card-title">${item.titulo}</div>
                    <div class="card-tags">${etiquetas}</div>
                </div>
            </a>
        `;
    }

    // Lógica simple para mover el slider
    function iniciarSlider() {
        const slides = document.querySelectorAll('.slide');
        if(slides.length === 0) return;
        let current = 0;
        slides[0].classList.add('active');
        
        setInterval(() => {
            slides[current].classList.remove('active');
            current = (current + 1) % slides.length;
            slides[current].classList.add('active');
        }, 5000);
    }

    window.onload = cargarWeb;
</script>

</body>
</html>
