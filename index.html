<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PARTY PLAY | Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        :root { --primary: #ff2d75; --bg: #0a0a0b; --text: #ffffff; }
        
        html, body { 
            margin: 0; padding: 0; width: 100%; max-width: 100vw;
            overflow-x: hidden; background: var(--bg); color: var(--text); 
            font-family: 'Poppins', sans-serif;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        /* HEADER FLOTANTE */
        header { 
            position: absolute; top: 0; left: 0; width: 100%;
            padding: 20px 5%; display: flex; align-items: center;
            z-index: 1000;
        }
        
        /* LOGO CON FONDO ROSA */
        .logo-box {
            background: var(--primary);
            padding: 8px 15px;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(255, 45, 117, 0.4);
            flex-shrink: 0;
        }
        .logo-img { height: 35px; width: auto; object-fit: contain; }

        /* BUSCADOR SOBRE EL SLIDER */
        .search-container { 
            margin-left: 20px;
            flex-grow: 1;
            max-width: 500px;
        }
        .search-bar { 
            width: 100%; 
            padding: 12px 20px; 
            border-radius: 50px; 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            background: rgba(0, 0, 0, 0.5); 
            backdrop-filter: blur(10px);
            color: white; 
            outline: none; 
            font-size: 0.9rem;
        }

        /* SLIDER PROFESIONAL CON AJUSTES DE ALTURA Y DIFUMINADO */
        .banner-wrapper { 
            width: 100%; 
            height: 85vh; /* Altura por defecto para móvil */
            position: relative; 
            overflow: hidden; 
            display: none; 
        }
        
        /* Aumento de altura para PC para que llegue hasta "Acción" */
        @media (min-width: 769px) {
            .banner-wrapper {
                height: 120vh; /* Altura incrementada para PC */
            }
        }

        .main-slider { height: 100%; width: 100%; }
        .swiper-slide { position: relative; background: #000; overflow: hidden; }
        
        .promo-img { width: 100%; height: 100%; position: absolute; inset: 0; }
        .promo-img img { 
            width: 100%; height: 100%; 
            object-fit: cover; 
            object-position: top center; 
            opacity: 0;
        }
        
        .swiper-slide-active .promo-img img { 
            opacity: 0.7;
            animation: kenburns 8s ease-out forwards; 
        }

        @keyframes kenburns {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        /* Degradado mejorado para difuminar el recorte inferior de forma linda */
        .promo-overlay { 
            position: absolute; inset: 0; 
            background: linear-gradient(to top, var(--bg) 0%, transparent 50%, rgba(0,0,0,0.6) 100%); 
            z-index: 2; 
        }

        .promo-info { 
            position: absolute; bottom: 12%; left: 5%; right: 5%; z-index: 3; 
            opacity: 0; transform: translateY(30px);
        }
        .swiper-slide-active .promo-info { 
            opacity: 1; transform: translateY(0); 
            transition: 1s ease 0.5s;
        }

        .promo-info h2 { 
            font-family: 'Orbitron'; 
            font-size: clamp(1.8rem, 4vw, 3.5rem); 
            margin: 0 0 15px 0; 
            text-shadow: 0 4px 20px rgba(0,0,0,0.9);
        }
        .btn-play { 
            background: var(--primary); color: white; padding: 12px 35px; border-radius: 50px; 
            font-weight: 900; text-decoration: none; display: inline-block; 
            font-size: 0.9rem; text-transform: uppercase;
        }

        /* CATEGORÍAS (LISTAS) */
        .row-title { font-family: 'Orbitron'; font-size: 1.2rem; margin: 40px 0 15px 5%; color: var(--primary); text-transform: uppercase; }
        .swiper-container { padding: 0 5% !important; overflow: visible !important; }
        
        .card { 
            background: #1a1a1c; border-radius: 10px; overflow: hidden; 
            text-decoration: none; color: white; display: block; border: 1px solid #222; 
            transition: 0.3s;
        }
        .card:hover { transform: scale(1.05); border-color: var(--primary); }
        
        .card-img-container {
            width: 100%;
            aspect-ratio: 2/3;
            overflow: hidden;
        }
        .card img { width: 100%; height: 100%; object-fit: cover; }

        .card span { padding: 10px; font-size: 0.8rem; text-align: center; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* RESPONSIVE MÓVIL */
        @media (max-width: 768px) {
            header { padding: 15px 5%; }
            .logo-img { height: 25px; }
            .search-container { margin-left: 10px; }
            .banner-wrapper { height: 70vh; }
        }

        #loading { text-align: center; padding: 150px 0; font-family: 'Orbitron'; color: var(--primary); font-size: 1.5rem; }
    </style>
</head>
<body>

    <header>
        <div class="logo-box">
            <img src="https://i.postimg.cc/7hgdMS6K/Picsart-24-08-01-00-13-45-109.png" alt="Logo" class="logo-img">
        </div>
        <div class="search-container">
            <input type="text" id="searchInput" class="search-bar" placeholder="Buscar..." onkeyup="filterAll()">
        </div>
    </header>

    <div id="loading">CARGANDO...</div>

    <div id="app" style="display:none">
        <div class="banner-wrapper" id="bannerBox">
            <div class="swiper main-slider">
                <div class="swiper-wrapper" id="sliderContent"></div>
            </div>
        </div>
        <main id="sections"></main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        async function init() {
            try {
                const r = await fetch('datos.json?v=' + Math.random());
                const data = await r.json();
                renderWeb(data);
            } catch (e) { document.getElementById('loading').innerText = "ERROR"; }
        }

        function renderWeb(pelis) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('app').style.display = 'block';

            const destacados = pelis.filter(p => p.enSlider === true);
            const sliderList = destacados.length > 0 ? destacados : pelis.slice(0, 3);

            document.getElementById('sliderContent').innerHTML = sliderList.map(p => `
                <div class="swiper-slide">
                    <div class="promo-img"><img src="${p.img}"></div>
                    <div class="promo-overlay"></div>
                    <div class="promo-info">
                        <h2>${p.titulo}</h2>
                        <a href="${p.url}" class="btn-play">VER AHORA</a>
                    </div>
                </div>
            `).join('');

            document.getElementById('bannerBox').style.display = 'block';
            
            new Swiper('.main-slider', { 
                loop: true, 
                effect: 'fade',
                autoplay: { delay: 5000 },
                speed: 1500
            });

            const main = document.getElementById('sections');
            const categorias = [...new Set(pelis.flatMap(p => p.etiquetas || p.tipos || ["General"]))].sort();

            categorias.forEach((cat, idx) => {
                const filtradas = pelis.filter(p => (p.etiquetas || p.tipos || []).includes(cat));
                const row = document.createElement('div');
                row.innerHTML = `
                    <h2 class="row-title">${cat}</h2>
                    <div class="swiper swiper-container" id="row-${idx}">
                        <div class="swiper-wrapper">
                            ${filtradas.map(p => `
                                <div class="swiper-slide" style="width:160px">
                                    <a href="${p.url}" class="card" data-title="${p.titulo}">
                                        <div class="card-img-container">
                                            <img src="${p.img}" loading="lazy">
                                        </div>
                                        <span>${p.titulo}</span>
                                    </a>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                main.appendChild(row);
                new Swiper(`#row-${idx}`, { slidesPerView: 'auto', spaceBetween: 15, freeMode: true });
            });
        }

        function filterAll() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.card').forEach(c => {
                const match = c.dataset.title.toLowerCase().includes(q);
                c.closest('.swiper-slide').style.display = match ? "block" : "none";
            });
        }
        window.onload = init;
    </script>
</body>
</html>
