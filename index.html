<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PARTY PLAY - Streaming Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #ff2d75; /* Rosa Party */
            --bg: #ffffff;
            --card-bg: #f9f9f9;
            --text: #1a1a1a;
            --header-bg: rgba(255, 255, 255, 0.95);
        }

        body.dark-mode {
            --bg: #0a0a0b;
            --card-bg: #161618;
            --text: #ffffff;
            --header-bg: rgba(10, 10, 11, 0.95);
        }

        html { scroll-behavior: smooth; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Poppins', sans-serif;
            margin: 0; padding: 0; overflow-x: hidden;
            transition: background 0.3s;
        }

        /* --- SALUDO ANIMADO DE ENTRADA --- */
        #welcome-screen {
            position: fixed;
            inset: 0; background: #000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 2000; transition: transform 0.8s cubic-bezier(0.7, 0, 0.3, 1);
        }
        .welcome-logo { font-family: 'Orbitron'; font-size: 3rem; color: var(--primary); animation: pulse 1.5s infinite; }
        .hide-welcome { transform: translateY(-100%); }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        /* --- Header Estilo Vista Movie --- */
        header {
            height: 70px; padding: 0 5%;
            background: var(--header-bg);
            backdrop-filter: blur(10px);
            position: fixed; width: 100%; top: 0; z-index: 1000;
            display: flex; align-items: center; justify-content: space-between;
            box-sizing: border-box;
            border-bottom: 1px solid rgba(255,45,117,0.2);
        }

        .logo-text { font-family: 'Orbitron'; font-size: 1.5rem; color: var(--primary); text-decoration: none; }

        nav a {
            color: var(--text); text-decoration: none; margin-left: 20px;
            font-size: 0.8rem; font-weight: 600; text-transform: uppercase;
        }
        nav a:hover { color: var(--primary); }

        .theme-toggle { cursor: pointer; font-size: 1.2rem; margin-left: 20px; border: none; background: none; color: var(--text); }

        /* --- Buscador Central --- */
        .search-container { text-align: center; margin-top: 120px; margin-bottom: 30px; }
        .search-bar {
            width: 80%; max-width: 500px;
            padding: 12px 25px; border-radius: 30px;
            border: 1px solid var(--primary); background: var(--card-bg); color: var(--text);
            outline: none; transition: 0.3s;
        }

        /* --- Banners de Publicidad Video MP4 --- */
        .ad-banner {
            width: 90%; max-width: 1100px; margin: 30px auto;
            border-radius: 12px; overflow: hidden; background: #000;
            box-shadow: 0 5px 15px rgba(255,45,117,0.2);
        }
        .ad-banner video { width: 100%; display: block; }

        /* --- Grid de Películas --- */
        .container { padding: 0 5% 50px 5%; }
        h2 {
            margin-top: 50px; font-family: 'Orbitron'; font-size: 1.2rem;
            border-left: 5px solid var(--primary); padding-left: 12px;
            text-transform: uppercase; color: var(--primary);
        }
        .movie-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px; margin-top: 20px;
        }

        .card {
            background: var(--card-bg); border-radius: 10px; overflow: hidden;
            transition: 0.3s ease; cursor: pointer; border: 1px solid rgba(255,45,117,0.1);
            text-decoration: none; color: inherit;
        }
        .card:hover { transform: scale(1.05); box-shadow: 0 8px 20px rgba(255,45,117,0.3); }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .card span { display: block; padding: 10px; font-size: 0.85rem; text-align: center; font-weight: 600; }

        footer { text-align: center; padding: 40px; color: #888; font-size: 0.8rem; }

        @media (max-width: 600px) {
            nav { display: none; }
            .movie-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
        }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <div class="welcome-logo">PARTY PLAY</div>
    </div>

    <header>
        <a href="#" class="logo-text">PARTY PLAY</a>
        <nav id="category-nav">
            </nav>
        <div style="display: flex; align-items: center;">
            <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
        </div>
    </header>

    <div class="search-container">
        <input type="text" id="searchInput" class="search-bar" placeholder="Buscar películas o música..." onkeyup="filterMovies()">
    </div>

    <div class="container" id="main-content">
        <div class="ad-banner">
            <video autoplay muted loop playsinline>
                <source src="TU_VIDEO_PUBLICIDAD_1.mp4" type="video/mp4">
            </video>
        </div>

        <div id="movie-sections">
            </div>

        <div class="ad-banner">
            <video autoplay muted loop playsinline>
                <source src="TU_VIDEO_PUBLICIDAD_2.mp4" type="video/mp4">
            </video>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 PARTY PLAY - Rosa & Blanco Edition</p>
    </footer>

    <script>
        let allData = [];

        // 1. Efecto Bienvenida
        window.addEventListener('load', () => {
            setTimeout(() => document.getElementById('welcome-screen').classList.add('hide-welcome'), 2000);
            loadJSON();
        });

        // 2. Modo Oscuro
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        }
        if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');

        // 3. Cargar Datos
        async function loadJSON() {
            try {
                const res = await fetch('datos.json');
                allData = await res.json();
                renderApp(allData);
            } catch (e) { console.error("Error cargando el JSON"); }
        }

        function renderApp(data) {
            const sectionsContainer = document.getElementById('movie-sections');
            const nav = document.getElementById('category-nav');
            sectionsContainer.innerHTML = '';
            nav.innerHTML = '';

            const movies = data.filter(item => item.titulo && item.tipo !== 'slider');
            
            // Obtener géneros únicos (tipos o etiquetas)
            const genres = new Set();
            movies.forEach(m => {
                const tags = m.tipos || m.etiquetas || [];
                tags.forEach(t => genres.add(t));
            });

            genres.forEach(genre => {
                // Crear link en menú
                const link = document.createElement('a');
                link.href = `#${genre.replace(/\s/g, '')}`;
                link.innerText = genre;
                nav.appendChild(link);

                // Crear Sección
                const genreMovies = movies.filter(m => (m.tipos || m.etiquetas || []).includes(genre));
                const section = document.createElement('div');
                section.id = genre.replace(/\s/g, '');
                section.innerHTML = `
                    <h2>${genre}</h2>
                    <div class="movie-grid">
                        ${genreMovies.map(m => `
                            <a href="${m.url}" class="card" data-title="${m.titulo}" target="_blank">
                                <img src="${m.img}" alt="${m.titulo}">
                                <span>${m.titulo}</span>
                            </a>
                        `).join('')}
                    </div>
                `;
                sectionsContainer.appendChild(section);
            });
        }

        // 4. Función de Buscador
        function filterMovies() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let cards = document.querySelectorAll('.card');
            cards.forEach(card => {
                let title = card.getAttribute('data-title').toLowerCase();
                card.style.display = title.includes(input) ? "block" : "none";
            });
        }
    </script>
</body>
</html>
