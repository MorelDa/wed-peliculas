<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PARTY PLAY | Premium Streaming</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <style>
        :root {
            --primary: #ff2d75;
            --bg: #050505;
            --text: #ffffff;
            --header: rgba(5, 5, 5, 0.9);
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0; overflow-x: hidden;
        }

        /* --- ENTRADA SUAVE --- */
        #intro {
            position: fixed; inset: 0; background: #000;
            display: flex; align-items: center; justify-content: center;
            z-index: 10000; transition: opacity 0.8s ease, visibility 0.8s;
        }
        .intro-logo {
            font-family: 'Orbitron'; font-size: 3rem; color: var(--primary);
            filter: drop-shadow(0 0 15px var(--primary));
            animation: pulseFade 2s ease-in-out infinite;
        }
        @keyframes pulseFade { 0%, 100% { opacity: 0.5; transform: scale(0.95); } 50% { opacity: 1; transform: scale(1); } }

        /* --- HEADER --- */
        header {
            height: 70px; padding: 0 5%;
            background: var(--header); backdrop-filter: blur(20px);
            position: fixed; width: 100%; top: 0; z-index: 1000;
            display: flex; align-items: center; justify-content: space-between;
            box-sizing: border-box; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .logo { font-family: 'Orbitron'; font-size: 1.6rem; color: var(--primary); text-decoration: none; font-weight: 900; }

        /* --- SLIDER BANNER (TAMAÑO RESPETADO) --- */
        .banner-container {
            margin-top: 90px;
            width: 90%; max-width: 1100px;
            margin-left: auto; margin-right: auto;
            border-radius: 12px; overflow: hidden;
            box-shadow: 0 5px 20px rgba(255,45,117,0.2);
            aspect-ratio: 16 / 6; /* Mantiene el tamaño tipo banner publicitario */
            background: #000;
        }
        .main-slider { width: 100%; height: 100%; }
        .swiper-slide img { width: 100%; height: 100%; object-fit: cover; }

        /* --- CONTENIDO --- */
        .content-container { padding: 40px 0 80px 5%; }
        .category-row { margin-bottom: 40px; }
        .category-title {
            font-family: 'Orbitron'; font-size: 1.1rem; margin-bottom: 15px;
            color: var(--primary); letter-spacing: 1px;
            border-left: 4px solid var(--primary); padding-left: 10px;
        }

        .movie-swiper { overflow: visible; }
        .movie-card {
            transition: transform 0.3s ease;
            border-radius: 8px; overflow: hidden;
            background: #111; cursor: pointer;
            text-decoration: none; color: white; display: block;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .movie-card:hover { transform: scale(1.08); z-index: 10; border-color: var(--primary); }
        .movie-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }
        .movie-card span { display: block; padding: 8px; font-size: 0.75rem; font-weight: 600; text-align: center; }

        /* --- BUSCADOR --- */
        .search-input {
            background: rgba(255,255,255,0.1); border: none; padding: 8px 15px;
            border-radius: 20px; color: white; outline: none; width: 150px;
        }

        .hide { opacity: 0; visibility: hidden; }
    </style>
</head>
<body>

<div id="intro"><div class="intro-logo">PARTY PLAY</div></div>

<header>
    <a href="#" class="logo">PARTY PLAY</a>
    <input type="text" class="search-input" placeholder="Buscar..." id="searchBox" oninput="filterRows()">
</header>

<div class="banner-container">
    <div class="swiper main-slider" id="topSlider">
        <div class="swiper-wrapper" id="sliderWrapper"></div>
        <div class="swiper-pagination"></div>
    </div>
</div>

<main class="content-container" id="mainGrid">
    </main>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    let db = [];

    window.addEventListener('load', () => {
        setTimeout(() => document.getElementById('intro').classList.add('hide'), 2000);
        loadData();
    });

    async function loadData() {
        try {
            const res = await fetch('datos.json');
            db = await res.json();
            
            // 1. Cargar Sliders
            const sliders = db.filter(i => i.tipo === 'slider');
            const wrap = document.getElementById('sliderWrapper');
            wrap.innerHTML = sliders.map(s => `<div class="swiper-slide"><img src="${s.img}"></div>`).join('');
            
            new Swiper('#topSlider', {
                loop: true,
                autoplay: { delay: 3500 },
                pagination: { el: '.swiper-pagination', clickable: true },
            });

            // 2. Cargar Películas y Videos (Todos incluidos)
            renderCategories(db.filter(i => i.titulo && i.tipo !== 'slider'));
        } catch (e) { console.error("Error al cargar JSON"); }
    }

    function renderCategories(items) {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = '';

        // Obtenemos géneros mezclando todos los campos posibles del JSON
        const genres = [...new Set(items.flatMap(m => m.tipos || m.etiquetas || ["Otros"]))].sort();

        genres.forEach((genre, index) => {
            const filtered = items.filter(m => {
                const tags = m.tipos || m.etiquetas || ["Otros"];
                return tags.includes(genre);
            });

            if (filtered.length === 0) return;

            const row = document.createElement('div');
            row.className = 'category-row';
            row.innerHTML = `
                <h2 class="category-title">${genre}</h2>
                <div class="swiper movie-swiper" id="swiper-${index}">
                    <div class="swiper-wrapper">
                        ${filtered.map(m => `
                            <div class="swiper-slide">
                                <a href="${m.url}" class="movie-card" target="_blank">
                                    <img src="${m.img}">
                                    <span>${m.titulo}</span>
                                </a>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            grid.appendChild(row);

            new Swiper(`#swiper-${index}`, {
                slidesPerView: 2.5,
                spaceBetween: 15,
                freeMode: true,
                grabCursor: true,
                autoplay: { delay: 4000 + (index * 300), disableOnInteraction: false },
                breakpoints: {
                    640: { slidesPerView: 3.5 },
                    1024: { slidesPerView: 5.5 },
                    1440: { slidesPerView: 7.5 }
                }
            });
        });
    }

    function filterRows() {
        const query = document.getElementById('searchBox').value.toLowerCase();
        const cards = document.querySelectorAll('.movie-card');
        cards.forEach(card => {
            const title = card.innerText.toLowerCase();
            card.closest('.swiper-slide').style.display = title.includes(query) ? "block" : "none";
        });
    }
</script>
</body>
</html>
