<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PARTY PLAY | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        :root { --primary: #ff2d75; --bg: #0a0a0b; --text: #ffffff; }
        * { box-sizing: border-box; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Poppins', sans-serif; overflow-x: hidden; }

        /* HEADER */
        header { height: 70px; padding: 0 5%; position: absolute; top: 0; width: 100%; z-index: 1000; display: flex; align-items: center; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); }
        .logo { font-family: 'Orbitron'; font-size: 1.7rem; color: var(--primary); font-weight: 900; }

        /* BUSCADOR */
        .search-container { position: relative; margin: 100px auto 20px; padding: 0 5%; max-width: 600px; z-index: 100; }
        .search-bar { width: 100%; padding: 16px 25px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(30,30,35,0.8); backdrop-filter: blur(10px); color: white; outline: none; border-bottom: 2px solid var(--primary); }

        /* SLIDER DINÁMICO (Sincronizado con Admin) */
        .banner-wrapper { width: 100%; height: 85vh; margin-top: -190px; position: relative; overflow: hidden; display: none; }
        .main-slider { height: 100%; width: 100%; }
        .swiper-slide { overflow: hidden; position: relative; background: #000; }
        .promo-img img { width: 100%; height: 100%; object-fit: cover; opacity: 0.4; transition: transform 2s ease; }
        .swiper-slide-active .promo-img img { transform: scale(1.1); }
        .promo-overlay { position: absolute; inset: 0; background: linear-gradient(70deg, #0a0a0b 30%, transparent 100%), linear-gradient(to top, #0a0a0b 10%, transparent 50%); z-index: 2; }
        .promo-info { position: absolute; bottom: 15%; left: 7%; z-index: 3; max-width: 80%; }
        .promo-info h2 { font-family: 'Orbitron'; font-size: clamp(1.8rem, 7vw, 3.5rem); margin: 0; }
        .btn-play { background: #fff; color: #000; padding: 15px 40px; border-radius: 4px; font-weight: 900; text-decoration: none; display: inline-block; margin-top: 20px; transition: 0.3s; }
        .btn-play:hover { background: var(--primary); color: white; }

        /* FILAS DE PELÍCULAS */
        .row-title { font-family: 'Orbitron'; font-size: 1.1rem; margin: 40px 0 15px 5%; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; }
        .swiper-container { padding: 0 5% !important; overflow: visible !important; }
        .card { background: #1a1a1c; border-radius: 8px; overflow: hidden; text-decoration: none; color: white; display: block; border: 1px solid #333; transition: 0.3s; }
        .card:hover { transform: translateY(-10px); border-color: var(--primary); }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .card span { padding: 10px; font-size: 0.8rem; text-align: center; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        #loading { text-align: center; margin-top: 200px; font-family: 'Orbitron'; color: var(--primary); }
    </style>
</head>
<body>

    <div id="loading">CARGANDO PARTY PLAY...</div>

    <div id="app" style="display:none">
        <header><div class="logo">PARTY PLAY</div></header>

        <div class="search-container">
            <input type="text" id="searchInput" class="search-bar" placeholder="Buscar por título o género..." onkeyup="filterAll()">
        </div>

        <div class="banner-wrapper" id="bannerBox">
            <div class="swiper main-slider">
                <div class="swiper-wrapper" id="sliderContent"></div>
            </div>
        </div>

        <main id="sections"></main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        async function init() {
            try {
                // Cache buster para GitHub
                const r = await fetch('datos.json?v=' + Math.random());
                const data = await r.json();
                
                // Normalizar datos (compatibilidad total)
                const pelis = data.map(m => ({
                    titulo: m.titulo || "Sin título",
                    img: m.img || "",
                    url: m.url || "#",
                    generos: m.etiquetas || m.tipos || ["General"],
                    sinopsis: m.sinopsis || m.synopsis || "Disponible ahora.",
                    enSlider: m.enSlider || false
                }));

                renderWeb(pelis);
            } catch (e) {
                document.getElementById('loading').innerHTML = "ERROR AL CARGAR DATOS.JSON";
            }
        }

        function renderWeb(pelis) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('app').style.display = 'block';

            // 1. CONFIGURAR SLIDER (Filtra las que marcaste en el Panel)
            const destacados = pelis.filter(p => p.enSlider === true);
            // Si no marcaste ninguna en el panel, usa las 3 primeras por defecto
            const sliderList = destacados.length > 0 ? destacados : pelis.slice(0, 3);

            document.getElementById('sliderContent').innerHTML = sliderList.map(p => `
                <div class="swiper-slide">
                    <div class="promo-img"><img src="${p.img}"></div>
                    <div class="promo-overlay"></div>
                    <div class="promo-info">
                        <h2>${p.titulo}</h2>
                        <p>${p.sinopsis}</p>
                        <a href="${p.url}" class="btn-play">VER AHORA</a>
                    </div>
                </div>
            `).join('');

            document.getElementById('bannerBox').style.display = 'block';
            new Swiper('.main-slider', { loop: true, effect: 'fade', autoplay: { delay: 5000 }, speed: 1000 });

            // 2. CONFIGURAR SECCIONES POR GÉNERO
            const main = document.getElementById('sections');
            const categorias = [...new Set(pelis.flatMap(p => p.generos))].sort();

            categorias.forEach((cat, idx) => {
                const filtradas = pelis.filter(p => p.generos.includes(cat));
                const row = document.createElement('div');
                row.innerHTML = `
                    <h2 class="row-title">${cat}</h2>
                    <div class="swiper swiper-container" id="row-${idx}">
                        <div class="swiper-wrapper">
                            ${filtradas.map(p => `
                                <div class="swiper-slide" style="width:160px">
                                    <a href="${p.url}" class="card" data-title="${p.titulo}">
                                        <img src="${p.img}">
                                        <span>${p.titulo}</span>
                                    </a>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                main.appendChild(row);
                new Swiper(`#row-${idx}`, { slidesPerView: 'auto', spaceBetween: 15, freeMode: true });
            });
        }

        function filterAll() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.card').forEach(c => {
                const match = c.dataset.title.toLowerCase().includes(q);
                c.closest('.swiper-slide').style.display = match ? "block" : "none";
            });
        }

        window.onload = init;
    </script>
</body>
</html>
