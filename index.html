<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PARTY PLAY - Streaming Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary-color: #e50914; --bg-color: #0a0a0a; --card-bg: #1a1a1a; --text-color: #ffffff; --header-height: 70px; }
        html { scroll-behavior: smooth; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Poppins', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }

        header { height: var(--header-height); padding: 0 5%; background: rgba(0,0,0,0.95); position: fixed; width: 100%; top: 0; z-index: 1000; display: flex; align-items: center; justify-content: space-between; box-sizing: border-box; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .site-logo { max-height: 40px; width: auto; cursor: pointer; }
        nav a { color: white; text-decoration: none; margin-left: 20px; font-size: 0.8rem; font-weight: 600; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        nav a:hover { color: var(--primary-color); }

        /* BUSCADOR PRIMERO */
        .search-container { text-align: center; margin-top: calc(var(--header-height) + 30px); margin-bottom: 20px; }
        .search-bar { width: 85%; max-width: 600px; padding: 15px 25px; border-radius: 30px; border: 1px solid #333; background: #111; color: white; outline: none; transition: 0.3s; font-size: 1rem; }
        .search-bar:focus { border-color: var(--primary-color); box-shadow: 0 0 15px rgba(229, 9, 20, 0.4); }

        /* LUEGO EL CARRUSEL */
        .main-slider { width: 90%; max-width: 1200px; height: 400px; margin: 0 auto 40px auto; overflow: hidden; position: relative; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .slider-track { display: flex; width: 100%; height: 100%; transition: 0.8s cubic-bezier(0.45, 0, 0.55, 1); }
        .slide { min-width: 100%; height: 100%; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }

        .container { padding: 0 5% 100px 5%; }
        .category-section { scroll-margin-top: 100px; }
        h2 { margin-top: 60px; font-size: 1.5rem; border-left: 5px solid var(--primary-color); padding-left: 15px; text-transform: uppercase; display: none; }
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 25px; margin-top: 25px; }
        .card { position: relative; transition: 0.4s ease; cursor: pointer; border-radius: 10px; overflow: hidden; background: var(--card-bg); display: none; border: 2px solid transparent; }
        .card:hover { transform: scale(1.08); z-index: 5; box-shadow: 0 0 25px rgba(229, 9, 20, 0.7); border-color: var(--primary-color); }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }
        .card span { display: block; padding: 12px; font-size: 0.85rem; text-align: center; }

        .player-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; }
        .close-btn { position: absolute; top: 20px; right: 20px; background: var(--primary-color); color: white; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        iframe { width: 100%; height: 100%; border: none; }

        footer { text-align: center; padding: 60px; color: #444; border-top: 1px solid #111; }
        @media (max-width: 600px) { .main-slider { height: 200px; } .movie-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); } }
    </style>
</head>
<body>

<header>
    <img src="https://i.postimg.cc/X7bmMQHY/logo.png" alt="Logo" class="site-logo" onclick="window.scrollTo(0,0)">
    <nav>
        <a href="#accion-sec">Acción</a>
        <a href="#terror-sec">Terror</a>
        <a href="#drama-sec">Drama</a>
        <a href="#comedia-sec">Comedia</a>
        <a href="#party-sec" style="color:#00f2ff;">Party Play</a>
    </nav>
</header>

<div class="search-container">
    <input type="text" id="searchInput" class="search-bar" placeholder="Buscar en PARTY PLAY..." onkeyup="filterCards()">
</div>

<div class="main-slider">
    <div class="slider-track" id="sliderTrack"></div>
</div>

<div class="container">
    <div id="ad-top" style="display:none; margin-bottom:40px;" class="ad-banner"></div>

    <div id="accion-sec" class="category-section">
        <h2 id="accion-h2">Películas de Acción</h2>
        <div class="movie-grid" id="accion-grid"></div>
    </div>
    <div id="terror-sec" class="category-section"><h2 id="terror-h2">Terror</h2><div class="movie-grid" id="terror-grid"></div></div>
    <div id="drama-sec" class="category-section"><h2 id="drama-h2">Drama</h2><div class="movie-grid" id="drama-grid"></div></div>
    <div id="comedia-sec" class="category-section"><h2 id="comedia-h2">Comedia</h2><div class="movie-grid" id="comedia-grid"></div></div>
    <div id="party-sec" class="category-section"><h2 id="party-play-h2" style="color:#00f2ff; border-left-color:#00f2ff;">🎵 Party Play</h2><div class="movie-grid" id="party-play-grid"></div></div>
</div>

<div id="videoPlayer" class="player-modal">
    <div class="close-btn" onclick="closePlayer()">CERRAR [X]</div>
    <iframe id="videoIframe" allowfullscreen></iframe>
</div>

<script>
    // La misma lógica de carga que antes pero respetando el nuevo orden
    async function loadContent() {
        try {
            const res = await fetch('datos.json');
            const data = await res.json();
            const sliderTrack = document.getElementById('sliderTrack');
            data.forEach(item => {
                if(item.tipo === 'slider') {
                    sliderTrack.innerHTML += `<div class="slide"><img src="${item.img}"></div>`;
                } else if(item.tipo === 'promo') {
                    const adZone = document.getElementById('ad-top');
                    adZone.style.display = 'block';
                    adZone.innerHTML = `<video autoplay muted loop playsinline style="width:100%; border-radius:15px;"><source src="${item.url}" type="video/mp4"></video>`;
                } else {
                    const grid = document.getElementById(item.tipo + '-grid');
                    if(grid) {
                        grid.innerHTML += `<div class="card" data-title="${item.titulo}" onclick="openPlayer('${item.url}')" style="display:block"><img src="${item.img}"><span>${item.titulo}</span></div>`;
                        document.getElementById(item.tipo + '-h2').style.display = 'block';
                    }
                }
            });
            startSlider();
        } catch (e) { console.error(e); }
    }
    function startSlider() {
        const track = document.getElementById('sliderTrack');
        let index = 0;
        const slides = document.querySelectorAll('.slide');
        if(slides.length > 1) setInterval(() => { index = (index + 1) % slides.length; track.style.transform = `translateX(-${index * 100}%)`; }, 5000);
    }
    function openPlayer(url) { document.getElementById('videoIframe').src = url; document.getElementById('videoPlayer').style.display = 'block'; document.body.style.overflow = 'hidden'; }
    function closePlayer() { document.getElementById('videoPlayer').style.display = 'none'; document.getElementById('videoIframe').src = ''; document.body.style.overflow = 'auto'; }
    function filterCards() {
        let input = document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('.card').forEach(card => {
            card.style.display = card.getAttribute('data-title').toLowerCase().includes(input) ? "block" : "none";
        });
    }
    window.onload = loadContent;
</script>
</body>
</html>
