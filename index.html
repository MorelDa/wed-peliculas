<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PARTY PLAY | Streaming</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <style>
        :root {
            --primary: #ff2d75;
            --bg: #0a0a0b;
            --card-bg: #161618;
            --text: #ffffff;
        }

        /* EVITAR MOVIMIENTO LATERAL DE LA WEB */
        html, body {
            max-width: 100vw;
            overflow-x: hidden;
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Poppins', sans-serif;
            position: relative;
        }

        /* ENTRADA */
        #intro {
            position: fixed; inset: 0; background: #000;
            display: flex; align-items: center; justify-content: center;
            z-index: 10000; transition: opacity 0.6s ease;
        }
        .intro-logo { font-family: 'Orbitron'; font-size: 2rem; color: var(--primary); letter-spacing: 5px; }

        /* HEADER */
        header {
            height: 60px; padding: 0 5%;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(10px);
            position: fixed; width: 100%; top: 0; z-index: 1000;
            display: flex; align-items: center; justify-content: space-between;
            box-sizing: border-box; border-bottom: 1px solid rgba(255,45,117,0.3);
        }
        .logo { font-family: 'Orbitron'; font-size: 1.2rem; color: var(--primary); text-decoration: none; font-weight: 900; }

        /* BUSCADOR CON LUPA */
        .search-container {
            text-align: center;
            margin: 90px auto 20px;
            padding: 0 5%;
            position: relative;
            max-width: 550px;
        }
        .search-bar {
            width: 100%;
            padding: 12px 20px 12px 45px;
            border-radius: 30px;
            border: 1px solid #333; background: #111; color: white;
            outline: none; font-size: 1rem; box-sizing: border-box;
        }
        .search-icon {
            position: absolute; left: 35px; top: 50%;
            transform: translateY(-50%); color: #666;
        }

        /* BANNER (PUBLICIDAD) */
        .banner-wrapper {
            width: 92%; margin: 10px auto;
            border-radius: 12px; overflow: hidden;
            aspect-ratio: 16 / 7; background: #000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .main-slider img { width: 100%; height: 100%; object-fit: cover; }

        /* CARRUSELES */
        .main-content { padding: 20px 0 60px 0; width: 100%; }
        
        .row-container { margin-bottom: 30px; width: 100%; overflow: hidden; }
        
        .row-title {
            font-family: 'Orbitron'; font-size: 1rem; color: var(--primary);
            margin: 0 0 15px 5%; border-left: 3px solid var(--primary);
            padding-left: 10px; text-transform: uppercase;
        }

        .swiper-container { padding-left: 5% !important; padding-right: 5% !important; }

        .card {
            background: var(--card-bg); border-radius: 8px; overflow: hidden;
            text-decoration: none; color: var(--text); display: block;
            border: 1px solid rgba(255,255,255,0.05);
            /* ELIMINAMOS EL CURSOR SI ES TÁCTIL PARA EVITAR LAGG */
        }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }
        .card .title { 
            padding: 6px; font-size: 0.75rem; text-align: center; 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block;
        }

        @media (max-width: 600px) {
            .banner-wrapper { aspect-ratio: 16 / 9; }
        }
    </style>
</head>
<body>

    <div id="intro"><div class="intro-logo">PARTY PLAY</div></div>

    <header>
        <a href="#" class="logo">PARTY PLAY</a>
        <span onclick="location.reload()" style="cursor:pointer; font-size: 1.2rem;">🏠</span>
    </header>

    <div class="search-container">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" class="search-bar" placeholder="Buscar..." onkeyup="filterAll()">
    </div>

    <div class="banner-wrapper">
        <div class="swiper main-slider" id="topSlider">
            <div class="swiper-wrapper" id="sliderItems"></div>
            <div class="swiper-pagination"></div>
        </div>
    </div>

    <main class="main-content" id="contentRows"></main>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        let moviesDB = [];

        window.onload = () => {
            setTimeout(() => document.getElementById('intro').style.opacity = '0', 1000);
            setTimeout(() => document.getElementById('intro').style.display = 'none', 1600);
            loadData();
        };

        async function loadData() {
            try {
                const res = await fetch('datos.json');
                const data = await res.json();
                moviesDB = data;

                // Cargar Slider Superior
                const sliders = data.filter(i => i.tipo === 'slider');
                document.getElementById('sliderItems').innerHTML = sliders.map(s => `
                    <div class="swiper-slide"><img src="${s.img}"></div>
                `).join('');
                
                new Swiper('#topSlider', {
                    loop: true,
                    autoplay: { delay: 4000 },
                    pagination: { el: '.swiper-pagination', clickable: true },
                });

                // Cargar todas las categorías del JSON
                renderCategories(data.filter(i => i.titulo && i.tipo !== 'slider'));
            } catch (e) { console.error("Error al cargar datos."); }
        }

        function renderCategories(items) {
            const container = document.getElementById('contentRows');
            container.innerHTML = '';

            // Extrae géneros de 'tipos' o 'etiquetas'
            const genres = [...new Set(items.flatMap(m => m.tipos || m.etiquetas || ["Otros"]))].sort();

            genres.forEach((genre, idx) => {
                const genreMovies = items.filter(m => (m.tipos || m.etiquetas || ["Otros"]).includes(genre));
                if(genreMovies.length === 0) return;

                const row = document.createElement('div');
                row.className = 'row-container';
                row.innerHTML = `
                    <h2 class="row-title">${genre}</h2>
                    <div class="swiper swiper-container" id="row-${idx}">
                        <div class="swiper-wrapper">
                            ${genreMovies.map(m => `
                                <div class="swiper-slide">
                                    <a href="${m.url}" class="card" data-title="${m.titulo}" target="_self">
                                        <img src="${m.img}" loading="lazy">
                                        <span class="title">${m.titulo}</span>
                                    </a>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                container.appendChild(row);

                new Swiper(`#row-${idx}`, {
                    slidesPerView: 2.3,
                    spaceBetween: 12,
                    freeMode: true,
                    grabCursor: true,
                    autoplay: { delay: 5000 + (idx * 150), disableOnInteraction: false },
                    breakpoints: {
                        600: { slidesPerView: 3.5 },
                        1024: { slidesPerView: 5.5 }
                    }
                });
            });
        }

        function filterAll() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const slides = document.querySelectorAll('.swiper-slide');
            slides.forEach(s => {
                const card = s.querySelector('.card');
                if(card) {
                    const match = card.getAttribute('data-title').toLowerCase().includes(q);
                    s.style.display = match ? "block" : "none";
                }
            });
        }
    </script>
</body>
</html>
