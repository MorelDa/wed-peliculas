<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Radio Party Valencia | Full Experience</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        :root { --pink: #ff2d55; --bg: #fff5f7; --text: #1a1a1a; --card-bg: white; }
        body.dark-mode { --bg: #0f0f0f; --text: #ffffff; --card-bg: #1e1e1e; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; transition: background-color 0.4s ease, color 0.4s ease; }
        
        .nexa-heavy { line-height: 0.8; letter-spacing: -2px; text-transform: uppercase; font-weight: 900; }

        /* BOTÓN MODO OSCURO */
        .dark-mode-toggle {
            position: fixed; top: 20px; right: 20px; z-index: 2000;
            width: 45px; height: 45px; border-radius: 50%;
            background: var(--pink); color: white; border: none;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 5px 15px rgba(255, 45, 85, 0.4);
        }

        /* HERO DINÁMICO */
        .top-hero {
            width: 100%; height: 60vh; position: relative; overflow: hidden;
            mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
        }
        .top-hero img { width: 100%; height: 100%; object-fit: cover; }

        /* CABECERA LADO A LADO */
        .main-header { 
            position: relative; z-index: 50; margin-top: -140px; padding: 0 15px;
            display: flex !important; flex-direction: row !important; 
            align-items: center; justify-content: center; gap: 15px;
        }
        .title-side { flex: 1; max-width: 55%; text-align: left; }
        .title-side h1 { font-size: 38px; }

        .heartbeat-container {
            width: 160px !important; height: 160px !important; flex-shrink: 0;
            border-radius: 2.5rem; border: 8px solid white;
            box-shadow: 0 25px 50px rgba(255, 45, 85, 0.4);
            overflow: hidden; animation: pulse 1.8s infinite ease-in-out; background: #fff;
        }

        @media (min-width: 768px) {
            .main-header { gap: 40px; margin-top: -180px; }
            .title-side h1 { font-size: 100px; }
            .heartbeat-container { width: 420px !important; height: 420px !important; border-radius: 4.5rem; border: 15px solid white; }
        }

        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.04); } }

        /* SECCIONES Y TARJETAS */
        .section-container { margin-top: 60px; }
        .section-title { text-align: center; margin-bottom: 30px; font-size: 32px; }
        .party-card { background: var(--card-bg); border-radius: 2.5rem; padding: 15px; transition: 0.4s ease; display: block; text-decoration: none; color: inherit; }
        .party-card img { border-radius: 1.8rem; width: 100%; aspect-ratio: 1/1; object-fit: cover; }

        /* SOCIAL */
        .social-pill { padding: 12px 20px; border-radius: 100px; color: white; font-size: 14px; font-weight: 900; display: inline-flex; align-items: center; gap: 8px; }
        .bg-instagram { background: linear-gradient(45deg, #f09433 0%, #dc2743 50%, #bc1888 100%); }
        .bg-tiktok { background: #000; border: 1px solid white; }
        .bg-whatsapp { background: #25D366; }

        /* TV VIDEO */
        .video-box {
            max-width: 900px; margin: 0 auto; border-radius: 2.5rem; overflow: hidden; 
            border: 6px solid white; background: #000; aspect-ratio: 16/9;
        }

        /* REPRODUCTOR FIJO */
        .bottom-player {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: #000; padding: 15px 20px; z-index: 1000;
            display: flex; align-items: center; justify-content: space-between;
            border-top: 4px solid var(--pink);
        }
    </style>
</head>
<body>

    <button class="dark-mode-toggle" id="mode-toggle"><i class="fas fa-moon" id="mode-icon"></i></button>

    <div class="top-hero">
        <div class="swiper main-slider h-full w-full" id="slider-principal">
            <div class="swiper-wrapper">
                </div>
        </div>
    </div>

    <header class="main-header">
        <div class="title-side"><h1 class="nexa-heavy">RADIO<br><span class="text-[#ff2d55]">PARTY.</span></h1></div>
        <div class="heartbeat-container">
            <img id="main-meta-img" src="https://i.postimg.cc/7hgdMS6K/Picsart-24-08-01-00-13-45-109.png" class="w-full h-full object-cover">
        </div>
    </header>

    <main class="pb-40" id="main-content">
        </main>

    <div class="bottom-player">
        <div class="flex items-center gap-3">
            <img id="player-art" src="https://i.postimg.cc/7hgdMS6K/Picsart-24-08-01-00-13-45-109.png" class="w-14 h-14 rounded-xl object-cover border-2 border-white">
            <div class="text-white overflow-hidden">
                <p id="track-title" class="font-black text-sm uppercase truncate w-32">Cargando...</p>
                <span class="text-pink-500 text-[10px] font-bold">EN DIRECTO</span>
            </div>
        </div>
        <button id="play-toggle" class="bg-pink-500 w-14 h-14 rounded-full text-white text-2xl shadow-lg">
            <i class="fas fa-play" id="play-icon"></i>
        </button>
    </div>

    <audio id="main-audio" src="https://miestacion.turadioonline.com.ar/8286/stream" crossorigin="anonymous"></audio>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        // MODO OSCURO
        const modeToggle = document.getElementById('mode-toggle');
        const modeIcon = document.getElementById('mode-icon');
        modeToggle.onclick = () => {
            document.body.classList.toggle('dark-mode');
            modeIcon.className = document.body.classList.contains('dark-mode') ? 'fas fa-sun' : 'fas fa-moon';
        };

        // CARGA DINÁMICA DE DATA.JSON
        async function cargarWeb() {
            try {
                const r = await fetch('data.json?v=' + Date.now());
                const data = await r.json();

                // 1. Slider Principal
                const sliderW = document.querySelector('#slider-principal .swiper-wrapper');
                if(data.slider_principal && data.slider_principal.length > 0) {
                    sliderW.innerHTML = data.slider_principal.map(img => `<div class="swiper-slide"><img src="${img}"></div>`).join('');
                    new Swiper('.main-slider', { loop: true, effect: 'fade', autoplay: { delay: 5000 } });
                }

                let htmlContent = '';

                // 2. Secciones (Novedades, Ranking, Sobre Nosotros)
                data.secciones.forEach(sec => {
                    if(sec.items && sec.items.length > 0) {
                        htmlContent += `
                        <section class="section-container">
                            <h2 class="section-title nexa-heavy">${sec.nombre} <span class="text-[#ff2d55]">${sec.sub}</span></h2>
                            <div class="swiper section-slider px-8">
                                <div class="swiper-wrapper">
                                    ${sec.items.map(item => `
                                        <div class="swiper-slide" style="width:240px">
                                            <a href="${item.url}" target="_blank" class="party-card shadow-lg">
                                                <img src="${item.img}">
                                                <h3 class="mt-3 text-center uppercase font-bold text-sm">${item.titulo}</h3>
                                            </a>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </section>`;
                    }
                });

                // 3. Redes Sociales
                htmlContent += `
                <section class="section-container">
                    <h2 class="section-title nexa-heavy">Síguenos <span class="text-[#ff2d55]">Live</span></h2>
                    <div class="flex justify-center flex-wrap gap-4 px-5">
                        <a href="${data.redes.instagram}" target="_blank" class="social-pill bg-instagram"><i class="fab fa-instagram"></i> INSTAGRAM</a>
                        <a href="${data.redes.tiktok}" target="_blank" class="social-pill bg-tiktok"><i class="fab fa-tiktok"></i> TIKTOK</a>
                        <a href="${data.redes.whatsapp}" target="_blank" class="social-pill bg-whatsapp"><i class="fab fa-whatsapp"></i> WHATSAPP</a>
                    </div>
                </section>`;

                // 4. Míranos Online (YouTube)
                if(data.youtube_url) {
                    htmlContent += `
                    <section class="section-container px-5">
                        <h2 class="section-title nexa-heavy">Míranos <span class="text-[#ff2d55]">Online</span></h2>
                        <div class="video-box">
                            <iframe class="w-full h-full" src="${data.youtube_url}" frameborder="0" allowfullscreen></iframe>
                        </div>
                    </section>`;
                }

                // 5. Footer
                htmlContent += `
                <footer class="mt-20 text-center opacity-60 pb-10">
                    <p>© 2026 <b>RADIO PARTY VALENCIA</b></p>
                    <p class="mt-1 tracking-widest uppercase text-[10px] font-black">djkevin producciones</p>
                </footer>`;

                document.getElementById('main-content').innerHTML = htmlContent;
                document.querySelectorAll('.section-slider').forEach(s => new Swiper(s, { slidesPerView: 'auto', spaceBetween: 15, freeMode: true }));

            } catch (e) { console.log("Error cargando el panel de control."); }
        }

        // REPRODUCTOR Y METADATOS
        const audio = document.getElementById('main-audio');
        const playBtn = document.getElementById('play-toggle');
        const playIcon = document.getElementById('play-icon');

        playBtn.onclick = () => {
            if (audio.paused) { audio.play(); playIcon.className = 'fas fa-pause'; }
            else { audio.pause(); playIcon.className = 'fas fa-play'; }
        };

        async function updateMeta() {
            try {
                const r = await fetch('https://miestacion.turadioonline.com.ar/cp/get_info.php?p=8286&v=' + Math.random());
                const d = await r.json();
                document.getElementById('track-title').innerText = d.title || "RADIO PARTY";
                document.getElementById('player-art').src = d.art || "https://i.postimg.cc/7hgdMS6K/Picsart-24-08-01-00-13-45-109.png";
                document.getElementById('main-meta-img').src = d.art || "https://i.postimg.cc/7hgdMS6K/Picsart-24-08-01-00-13-45-109.png";
            } catch (e) {}
        }

        window.onload = () => {
            cargarWeb();
            updateMeta();
            setInterval(updateMeta, 10000);
        };
    </script>
</body>
</html>
