<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PARTY PLAY - DJ KEVIN DAVID</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #e50914; --cyber: #00f2ff; --bg: #050505; --card-bg: #121212; }
        html { scroll-behavior: smooth; }
        body { background: var(--bg); color: #fff; font-family: 'Poppins', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }

        /* PRELOADER ULTRA-TECH (5 SEGUNDOS) */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; justify-content: center; align-items: center;
            z-index: 10000; overflow: hidden;
        }
        .cyber-bg {
            position: absolute; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px; animation: bgMove 20s linear infinite;
        }
        @keyframes bgMove { from { background-position: 0 0; } to { background-position: 30px 30px; } }
        .loader-content { position: relative; z-index: 2; width: 320px; text-align: center; }
        .logo-box { position: relative; display: inline-block; margin-bottom: 25px; }
        .loader-logo { max-height: 90px; filter: drop-shadow(0 0 10px var(--cyber)); }
        .scan-line { position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: var(--cyber); box-shadow: 0 0 10px var(--cyber); animation: scan 2s infinite ease-in-out; }
        @keyframes scan { 0%, 100% { top: 0%; } 50% { top: 100%; } }
        .loader-text h1 { font-family: 'Orbitron'; font-size: 1rem; letter-spacing: 3px; color: var(--cyber); margin: 10px 0; }
        .welcome-msg { font-size: 0.9rem; opacity: 0.8; margin-bottom: 5px; }
        .signature { font-size: 0.8rem; font-weight: bold; text-transform: uppercase; }
        .signature span { color: var(--primary); }
        .progress-box { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 10px; margin: 20px 0; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: var(--cyber); box-shadow: 0 0 15px var(--cyber); }
        .percent-text { font-family: 'Orbitron'; font-size: 12px; color: var(--cyber); }
        .loader-hidden { opacity: 0 !important; visibility: hidden !important; transition: 1s ease-in-out; }

        /* HEADER */
        header { height: 70px; background: rgba(0,0,0,0.9); position: fixed; width: 100%; top: 0; z-index: 1000; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .site-logo { max-height: 50px; cursor: pointer; }

        /* NAV Y SEARCH */
        .nav-container { margin-top: 90px; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .category-nav { display: flex; justify-content: center; flex-wrap: wrap; gap: 8px; width: 95%; }
        .category-nav a { background: #111; color: #fff; padding: 8px 16px; border-radius: 20px; text-decoration: none; font-size: 0.75rem; font-weight: bold; border: 1px solid #333; text-transform: uppercase; transition: 0.3s; }
        .category-nav a:hover { border-color: var(--primary); color: var(--primary); }
        .search-bar { width: 85%; max-width: 500px; padding: 12px 25px; border-radius: 30px; border: 1px solid #333; background: #000; color: white; outline: none; }

        /* CARRUSEL REPARADO */
        .main-slider { width: 95%; max-width: 1200px; height: 450px; margin: 25px auto; overflow: hidden; border-radius: 20px; position: relative; border: 1px solid rgba(255,255,255,0.1); }
        .slider-track { display: flex; width: 100%; height: 100%; transition: transform 0.8s cubic-bezier(0.65, 0, 0.35, 1); }
        .slide { min-width: 100%; width: 100%; height: 100%; flex-shrink: 0; pointer-events: none; /* Evita interferencia al tocar */ }
        .slide img { width: 100%; height: 100%; object-fit: cover; display: block; }

        /* PORTADAS MÁS GRANDES */
        .container { padding: 0 5% 100px 5%; }
        .category-section { scroll-margin-top: 100px; display: none; margin-bottom: 50px; }
        h2 { font-family: 'Orbitron'; font-size: 1.3rem; border-left: 5px solid var(--primary); padding-left: 15px; margin-bottom: 25px; }
        
        .movie-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); /* PORTADAS MÁS ANCHAS */
            gap: 25px; 
        }
        .card { background: var(--card-bg); border-radius: 12px; overflow: hidden; transition: 0.4s; cursor: pointer; border: 1px solid #222; }
        .card:hover { transform: scale(1.05); border-color: var(--cyber); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }
        .card span { display: block; padding: 12px; font-size: 0.9rem; text-align: center; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* REPRODUCTOR */
        .player-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; }
        .player-header { position: absolute; top: 0; width: 100%; padding: 15px; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .close-btn { background: var(--primary); color: #fff; padding: 8px 16px; border-radius: 5px; cursor: pointer; font-family: 'Orbitron'; font-size: 10px; font-weight: bold; }
        iframe { width: 100%; height: 100%; border: none; }

        @media (max-width: 600px) { 
            .main-slider { height: 230px; } 
            .movie-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; } /* Portadas grandes en móvil */
            h2 { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

<div id="loader">
    <div class="cyber-bg"></div>
    <div class="loader-content">
        <div class="logo-box"><img src="https://i.postimg.cc/X7bmMQHY/logo.png" class="loader-logo"><div class="scan-line"></div></div>
        <div class="loader-text">
            <h1>SISTEMA ONLINE</h1>
            <p class="welcome-msg">Bienvenidos a esta página...</p>
            <p class="signature">Creador: <span>KEVIN DAVID</span></p>
        </div>
        <div class="progress-box"><div class="progress-bar" id="pBar"></div></div>
        <div class="percent-text" id="pText">0%</div>
    </div>
</div>

<header><img src="https://i.postimg.cc/X7bmMQHY/logo.png" class="site-logo" onclick="window.scrollTo(0,0)"></header>

<div class="nav-container">
    <div class="category-nav">
        <a href="#accion-sec">Acción</a>
        <a href="#terror-sec">Terror</a>
        <a href="#biopic-sec">Biopic</a>
        <a href="#drama-sec">Drama</a>
        <a href="#comedia-sec">Comedia</a>
        <a href="#series-sec">Series</a>
        <a href="#party-sec" style="color:var(--cyber); border-color:var(--cyber);">Party Play</a>
    </div>
    <input type="text" id="searchInput" class="search-bar" placeholder="Buscar título o categoría..." onkeyup="filterCards()">
</div>

<div class="main-slider">
    <div class="slider-track" id="sliderTrack"></div>
</div>

<div class="container">
    <div id="ad-top" style="display:none; margin-bottom:30px;"></div>
    
    <div id="accion-sec" class="category-section"><h2>Acción</h2><div class="movie-grid" id="accion-grid"></div></div>
    <div id="terror-sec" class="category-section"><h2>Terror</h2><div class="movie-grid" id="terror-grid"></div></div>
    <div id="biopic-sec" class="category-section"><h2>Biopic</h2><div class="movie-grid" id="biopic-grid"></div></div>
    <div id="drama-sec" class="category-section"><h2>Drama</h2><div class="movie-grid" id="drama-grid"></div></div>
    <div id="comedia-sec" class="category-section"><h2>Comedia</h2><div class="movie-grid" id="comedia-grid"></div></div>
    <div id="series-sec" class="category-section"><h2>Series Premium</h2><div class="movie-grid" id="series-grid"></div></div>
    <div id="party-sec" class="category-section"><h2 style="color:var(--cyber);">Party Play</h2><div class="movie-grid" id="party-play-grid"></div></div>
</div>

<div id="videoPlayer" class="player-modal">
    <div class="player-header">
        <div id="playerTitle" style="font-family:'Orbitron'; font-size:12px; color:white;">CARGANDO...</div>
        <div class="close-btn" onclick="closePlayer()">CERRAR [X]</div>
    </div>
    <iframe id="videoIframe" allowfullscreen></iframe>
</div>

<script>
    async function loadContent() {
        try {
            const res = await fetch('datos.json');
            const data = await res.json();
            const track = document.getElementById('sliderTrack');
            
            data.forEach(item => {
                const tipos = item.tipos || [item.tipo];
                if(tipos.includes('slider')) {
                    track.innerHTML += `<div class="slide"><img src="${item.img}"></div>`;
                }
                if(tipos.includes('promo')) {
                    const ad = document.getElementById('ad-top');
                    ad.style.display = 'block';
                    ad.innerHTML = `<video autoplay muted loop playsinline style="width:100%; border-radius:12px;"><source src="${item.url}" type="video/mp4"></video>`;
                }
                tipos.forEach(t => {
                    const grid = document.getElementById(t + '-grid');
                    const section = document.getElementById(t + '-sec');
                    if(grid && section) {
                        section.style.display = 'block';
                        grid.innerHTML += `<div class="card" data-title="${item.titulo}" onclick="openPlayer('${item.url}', '${item.titulo}', '${tipos.join(' | ')}')"><img src="${item.img}"><span>${item.titulo}</span></div>`;
                    }
                });
            });
            
            // Iniciar slider y loader
            startSlider();
            runLoader();
            
        } catch (e) { 
            console.log(e);
            document.getElementById('loader').style.display='none'; 
        }
    }

    function runLoader() {
        let p = 0;
        const bar = document.getElementById('pBar'), txt = document.getElementById('pText');
        const int = setInterval(() => {
            p++; bar.style.width = p + "%"; txt.innerText = p + "%";
            if(p >= 100) { 
                clearInterval(int); 
                setTimeout(() => document.getElementById('loader').classList.add('loader-hidden'), 600); 
            }
        }, 45); // 4.5 a 5 segundos
    }

    function startSlider() {
        const track = document.getElementById('sliderTrack');
        let index = 0;
        const slides = document.getElementsByClassName('slide');
        
        if(slides.length > 1) {
            setInterval(() => {
                index++;
                if(index >= slides.length) index = 0;
                track.style.transform = `translateX(-${index * 100}%)`;
            }, 5000); // Cambia cada 5 segundos
        }
    }

    function openPlayer(url, title, tags) {
        document.getElementById('videoIframe').src = url;
        document.getElementById('playerTitle').innerText = title.toUpperCase() + " | " + tags.toUpperCase();
        document.getElementById('videoPlayer').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function closePlayer() {
        document.getElementById('videoPlayer').style.display = 'none';
        document.getElementById('videoIframe').src = '';
        document.body.style.overflow = 'auto';
    }

    function filterCards() {
        let input = document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('.card').forEach(card => {
            card.style.display = card.getAttribute('data-title').toLowerCase().includes(input) ? "block" : "none";
        });
    }
    window.onload = loadContent;
</script>
</body>
</html>
