<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PARTY PLAY</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff2d75;
            --bg: #ffffff;
            --text: #111111;
            --card-bg: #f5f5f7;
            --header: rgba(255, 255, 255, 0.8);
        }

        [data-theme="dark"] {
            --bg: #000000;
            --text: #ffffff;
            --card-bg: #1c1c1e;
            --header: rgba(0, 0, 0, 0.8);
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            transition: background 0.3s ease;
            -webkit-font-smoothing: antialiased;
        }

        /* ENTRADA LIMPIA */
        #intro {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 0.8s ease;
        }
        #intro h1 {
            color: white;
            font-size: 2.5rem;
            letter-spacing: -1px;
            font-weight: 700;
            opacity: 0;
            transform: translateY(10px);
            animation: fadeIn 1s forwards;
        }
        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 15px 5%;
            background: var(--header);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--primary);
            text-decoration: none;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .search-input {
            background: var(--card-bg);
            border: none;
            padding: 10px 15px;
            border-radius: 10px;
            color: var(--text);
            font-size: 0.9rem;
            width: 200px;
            outline: none;
        }

        .theme-toggle {
            cursor: pointer;
            font-size: 1.2rem;
            user-select: none;
        }

        .container {
            padding: 20px 5%;
        }

        .row-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin: 40px 0 20px;
        }

        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }

        .movie-card {
            text-decoration: none;
            color: inherit;
            transition: transform 0.3s ease;
        }

        .movie-card:hover {
            transform: scale(1.04);
        }

        .poster {
            width: 100%;
            aspect-ratio: 2/3;
            background: var(--card-bg);
            border-radius: 12px;
            object-fit: cover;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .movie-info {
            margin-top: 10px;
        }

        .movie-title {
            font-weight: 600;
            font-size: 0.9rem;
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .movie-meta {
            font-size: 0.8rem;
            opacity: 0.6;
        }

        @media (max-width: 600px) {
            .movie-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
            .search-input { width: 120px; }
        }
    </style>
</head>
<body>

<div id="intro">
    <h1>PARTY PLAY</h1>
</div>

<header>
    <a href="#" class="logo">PARTY PLAY</a>
    <div class="controls">
        <input type="text" class="search-input" placeholder="Buscar..." id="searchBox">
        <div class="theme-toggle" id="themeBtn">🌓</div>
    </div>
</header>

<main class="container" id="content">
    </main>

<script>
    let movies = [];
    const content = document.getElementById('content');
    const searchBox = document.getElementById('searchBox');
    const themeBtn = document.getElementById('themeBtn');

    // 1. INTRO
    window.addEventListener('load', () => {
        setTimeout(() => {
            const intro = document.getElementById('intro');
            intro.style.opacity = '0';
            setTimeout(() => intro.style.display = 'none', 800);
        }, 1500);
        loadData();
    });

    // 2. TEMA
    themeBtn.addEventListener('click', () => {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const nextTheme = currentTheme === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', nextTheme);
        localStorage.setItem('theme', nextTheme);
    });

    if (localStorage.getItem('theme') === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
    }

    // 3. DATOS
    async function loadData() {
        try {
            const res = await fetch('datos.json');
            movies = await res.json();
            render(movies);
        } catch (e) {
            console.error("Error cargando JSON");
        }
    }

    function render(data) {
        content.innerHTML = '';
        const catalogo = data.filter(i => i.titulo);
        
        // Agrupar por el primer "tipo" que tengan
        const categories = [...new Set(catalogo.flatMap(i => i.tipos || ["General"]))];

        categories.forEach(cat => {
            const items = catalogo.filter(i => i.tipos && i.tipos.includes(cat));
            if (items.length > 0) {
                const section = document.createElement('div');
                section.innerHTML = `
                    <h2 class="row-title">${cat}</h2>
                    <div class="movie-grid">
                        ${items.map(m => `
                            <a href="${m.url}" class="movie-card">
                                <img src="${m.img}" class="poster">
                                <div class="movie-info">
                                    <span class="movie-title">${m.titulo}</span>
                                    <span class="movie-meta">${m.year || ''}</span>
                                </div>
                            </a>
                        `).join('')}
                    </div>
                `;
                content.appendChild(section);
            }
        });
    }

    searchBox.addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase();
        const filtered = movies.filter(m => m.titulo.toLowerCase().includes(query));
        render(filtered);
    });
</script>

</body>
</html>
