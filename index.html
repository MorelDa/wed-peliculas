<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PARTY PLAY | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        :root { --primary: #ff2d75; --bg: #0a0a0b; --text: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Poppins', sans-serif; }

        /* HEADER & BUSCADOR */
        header { 
            background: #000; 
            padding: 15px 5%; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 15px;
            border-bottom: 1px solid #222;
        }
        .logo { font-family: 'Orbitron'; font-size: 1.5rem; color: var(--primary); font-weight: 900; }

        .search-container { width: 100%; max-width: 500px; }
        .search-bar { 
            width: 100%; 
            padding: 12px 20px; 
            border-radius: 8px; 
            border: 1px solid #333; 
            background: #1a1a1c; 
            color: white; 
            outline: none; 
            font-size: 0.9rem;
        }

        /* SLIDER (DEBAJO DEL BUSCADOR) */
        .banner-wrapper { 
            width: 100%; 
            height: 60vh; /* Altura más cómoda para móviles */
            position: relative; 
            overflow: hidden; 
            display: none; 
        }
        .main-slider { height: 100%; width: 100%; }
        .swiper-slide { position: relative; background: #000; }
        
        /* Imagen del Slider */
        .promo-img img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            opacity: 0.6; 
        }

        /* Degradado para que se vea el título */
        .promo-overlay { 
            position: absolute; 
            inset: 0; 
            background: linear-gradient(to top, var(--bg) 10%, transparent 90%); 
            z-index: 2; 
        }

        /* Información del Slider (Solo Título y Botón) */
        .promo-info { 
            position: absolute; 
            bottom: 30px; 
            left: 5%; 
            right: 5%; 
            z-index: 3; 
            text-align: left;
        }
        .promo-info h2 { 
            font-family: 'Orbitron'; 
            font-size: 1.8rem; 
            margin: 0 0 15px 0; 
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
        }
        .btn-play { 
            background: var(--primary); 
            color: white; 
            padding: 12px 25px; 
            border-radius: 5px; 
            font-weight: 900; 
            text-decoration: none; 
            display: inline-block; 
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        /* CATEGORÍAS */
        .row-title { font-family: 'Orbitron'; font-size: 1rem; margin: 30px 0 15px 5%; color: var(--primary); }
        .swiper-container { padding: 0 5% !important; overflow: visible !important; }
        .card { background: #1a1a1c; border-radius: 6px; overflow: hidden; text-decoration: none; color: white; display: block; border: 1px solid #222; }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .card span { padding: 8px; font-size: 0.75rem; text-align: center; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        #loading { text-align: center; padding: 50px; font-family: 'Orbitron'; color: var(--primary); }
    </style>
</head>
<body>

    <header>
        <div class="logo">PARTY PLAY</div>
        <div class="search-container">
            <input type="text" id="searchInput" class="search-bar" placeholder="Buscar película..." onkeyup="filterAll()">
        </div>
    </header>

    <div id="loading">CONECTANDO...</div>

    <div id="app" style="display:none">
        <div class="banner-wrapper" id="bannerBox">
            <div class="swiper main-slider">
                <div class="swiper-wrapper" id="sliderContent"></div>
                <div class="swiper-pagination"></div>
            </div>
        </div>

        <main id="sections"></main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        async function init() {
            try {
                const r = await fetch('datos.json?v=' + Math.random());
                const data = await r.json();
                renderWeb(data);
            } catch (e) {
                document.getElementById('loading').innerHTML = "ERROR AL CARGAR";
            }
        }

        function renderWeb(pelis) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('app').style.display = 'block';

            // SLIDER: Solo las marcadas como enSlider en el Admin
            const destacados = pelis.filter(p => p.enSlider === true);
            const sliderList = destacados.length > 0 ? destacados : pelis.slice(0, 3);

            document.getElementById('sliderContent').innerHTML = sliderList.map(p => `
                <div class="swiper-slide">
                    <div class="promo-img"><img src="${p.img}"></div>
                    <div class="promo-overlay"></div>
                    <div class="promo-info">
                        <h2>${p.titulo}</h2>
                        <a href="${p.url}" class="btn-play">VER AHORA</a>
                    </div>
                </div>
            `).join('');

            document.getElementById('bannerBox').style.display = 'block';
            new Swiper('.main-slider', { 
                loop: true, 
                autoplay: { delay: 4000 },
                pagination: { el: '.swiper-pagination', clickable: true }
            });

            // CATEGORÍAS
            const main = document.getElementById('sections');
            const categorias = [...new Set(pelis.flatMap(p => p.etiquetas || p.tipos || ["General"]))].sort();

            categorias.forEach((cat, idx) => {
                const filtradas = pelis.filter(p => (p.etiquetas || p.tipos || []).includes(cat));
                const row = document.createElement('div');
                row.innerHTML = `
                    <h2 class="row-title">${cat}</h2>
                    <div class="swiper swiper-container" id="row-${idx}">
                        <div class="swiper-wrapper">
                            ${filtradas.map(p => `
                                <div class="swiper-slide" style="width:130px">
                                    <a href="${p.url}" class="card" data-title="${p.titulo}">
                                        <img src="${p.img}">
                                        <span>${p.titulo}</span>
                                    </a>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                main.appendChild(row);
                new Swiper(`#row-${idx}`, { slidesPerView: 'auto', spaceBetween: 10, freeMode: true });
            });
        }

        function filterAll() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.card').forEach(c => {
                const match = c.dataset.title.toLowerCase().includes(q);
                c.closest('.swiper-slide').style.display = match ? "block" : "none";
            });
        }

        window.onload = init;
    </script>
</body>
</html>
