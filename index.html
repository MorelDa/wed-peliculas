<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Radio Party Valencia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        :root { --pink: #ff2d55; --bg: #fff5f7; --text: #1a1a1a; --card-bg: white; }
        body.dark-mode { --bg: #0f0f0f; --text: #ffffff; --card-bg: #1e1e1e; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; }
        .nexa-heavy { line-height: 0.8; letter-spacing: -2px; text-transform: uppercase; font-weight: 900; }
        .dark-mode-toggle { position: fixed; top: 20px; right: 20px; z-index: 2000; width: 45px; height: 45px; border-radius: 50%; background: var(--pink); color: white; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .top-hero { width: 100%; height: 50vh; position: relative; overflow: hidden; mask-image: linear-gradient(to bottom, black 80%, transparent 100%); -webkit-mask-image: linear-gradient(to bottom, black 80%, transparent 100%); }
        .top-hero img { width: 100%; height: 100%; object-fit: cover; }
        .main-header { position: relative; z-index: 50; margin-top: -100px; padding: 0 15px; display: flex; align-items: center; justify-content: center; gap: 15px; }
        .heartbeat-container { width: 150px; height: 150px; flex-shrink: 0; border-radius: 2rem; border: 6px solid white; box-shadow: 0 20px 40px rgba(255, 45, 85, 0.3); overflow: hidden; animation: pulse 1.8s infinite ease-in-out; background: #fff; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .party-card { background: var(--card-bg); border-radius: 2rem; padding: 12px; display: block; text-decoration: none; color: inherit; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .party-card img { border-radius: 1.5rem; width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .bottom-player { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; padding: 12px 20px; z-index: 1000; display: flex; align-items: center; justify-content: space-between; border-top: 4px solid var(--pink); }
    </style>
</head>
<body>

    <button class="dark-mode-toggle" id="mode-toggle"><i class="fas fa-moon"></i></button>

    <div class="top-hero">
        <div class="swiper main-slider h-full w-full">
            <div class="swiper-wrapper" id="slider-wrapper">
                <div class="swiper-slide"><img src="https://img.freepik.com/foto-gratis/vista-frontal-mujer-escuchando-musica_23-2148597018.jpg"></div>
            </div>
        </div>
    </div>

    <header class="main-header">
        <div class="flex-1 max-w-[50%]"><h1 class="nexa-heavy text-[32px] md:text-[80px]">RADIO<br><span class="text-[#ff2d55]">PARTY.</span></h1></div>
        <div class="heartbeat-container"><img id="main-meta-img" src="https://i.postimg.cc/7hgdMS6K/Picsart-24-08-01-00-13-45-109.png" class="w-full h-full object-cover"></div>
    </header>

    <main id="main-content" class="pb-32 pt-10">
        </main>

    <div class="bottom-player">
        <div class="flex items-center gap-3">
            <img id="player-art" src="https://i.postimg.cc/7hgdMS6K/Picsart-24-08-01-00-13-45-109.png" class="w-12 h-12 rounded-lg object-cover">
            <div class="text-white">
                <p id="track-title" class="font-bold text-xs uppercase truncate w-32">Radio Party Valencia</p>
                <span class="text-[#ff2d55] text-[9px] font-black">EN DIRECTO</span>
            </div>
        </div>
        <button id="play-btn" class="bg-[#ff2d55] w-12 h-12 rounded-full text-white text-xl shadow-lg flex items-center justify-center">
            <i class="fas fa-play" id="play-icon"></i>
        </button>
    </div>

    <audio id="radio-audio" src="https://miestacion.turadioonline.com.ar/8286/stream" crossorigin="anonymous"></audio>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        // 1. REPRODUCTOR (Prioridad máxima)
        const audio = document.getElementById('radio-audio');
        const playBtn = document.getElementById('play-btn');
        const playIcon = document.getElementById('play-icon');

        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play().then(() => {
                    playIcon.className = 'fas fa-pause';
                }).catch(err => console.error("Error al reproducir:", err));
            } else {
                audio.pause();
                playIcon.className = 'fas fa-play';
            }
        });

        // 2. MODO OSCURO
        document.getElementById('mode-toggle').onclick = () => document.body.classList.toggle('dark-mode');

        // 3. CARGAR JSON
        async function init() {
            try {
                const res = await fetch('data.json?v=' + Date.now());
                const data = await res.json();

                // Slider
                const sliderW = document.getElementById('slider-wrapper');
                const validSlides = data.slider_principal.filter(s => s.length > 5);
                if(validSlides.length > 0) {
                    sliderW.innerHTML = validSlides.map(img => `<div class="swiper-slide"><img src="${img}"></div>`).join('');
                    new Swiper('.main-slider', { loop: true, autoplay: { delay: 4000 } });
                }

                let html = '';

                // Secciones (Solo si tienen items)
                data.secciones.forEach(sec => {
                    if(sec.items && sec.items.length > 0) {
                        html += `
                        <div class="mt-10">
                            <h2 class="text-center nexa-heavy text-2xl mb-4">${sec.nombre} <span class="text-[#ff2d55]">${sec.sub}</span></h2>
                            <div class="swiper sec-slider px-6">
                                <div class="swiper-wrapper">
                                    ${sec.items.map(item => `
                                        <div class="swiper-slide" style="width:200px">
                                            <a href="${item.url}" target="_blank" class="party-card">
                                                <img src="${item.img}">
                                                <p class="mt-2 text-center text-[10px] font-bold uppercase">${item.titulo}</p>
                                            </a>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>`;
                    }
                });

                // Redes
                html += `
                <div class="flex justify-center gap-4 mt-10 px-4">
                    <a href="${data.redes.instagram}" class="bg-black text-white px-4 py-2 rounded-full text-[10px] font-bold">INSTAGRAM</a>
                    <a href="${data.redes.whatsapp}" class="bg-[#25D366] text-white px-4 py-2 rounded-full text-[10px] font-bold">WHATSAPP</a>
                </div>`;

                document.getElementById('main-content').innerHTML = html;
                new Swiper('.sec-slider', { slidesPerView: 'auto', spaceBetween: 15 });

            } catch (e) {
                console.warn("JSON vacío o error de carga. La radio sigue operativa.");
            }
        }

        // 4. METADATOS
        async function updateMeta() {
            try {
                const r = await fetch('https://miestacion.turadioonline.com.ar/cp/get_info.php?p=8286');
                const d = await r.json();
                if(d.title) document.getElementById('track-title').innerText = d.title;
                if(d.art) {
                    document.getElementById('player-art').src = d.art;
                    document.getElementById('main-meta-img').src = d.art;
                }
            } catch (e) {}
        }

        window.onload = () => { init(); updateMeta(); setInterval(updateMeta, 15000); };
    </script>
</body>
</html>
