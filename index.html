<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PARTY PLAY - DJ KEVIN DAVID</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #e50914; --cyber: #00f2ff; --bg: #050505; --card-bg: #121212; }
        body { background: var(--bg); color: #fff; font-family: 'Poppins', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }

        /* PRELOADER 5 SEG */
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; z-index: 10000; }
        .loader-content { text-align: center; width: 280px; }
        .loader-logo { max-height: 70px; filter: drop-shadow(0 0 8px var(--cyber)); margin-bottom: 15px; }
        .progress-box { width: 100%; height: 3px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: var(--cyber); }
        .loader-hidden { opacity: 0; visibility: hidden; transition: 0.8s; }

        /* HEADER - LOGO IZQUIERDA */
        header { 
            height: 65px; background: rgba(0,0,0,0.9); position: fixed; width: 100%; top: 0; z-index: 1000; 
            display: flex; align-items: center; padding: 0 30px; border-bottom: 1px solid rgba(255,255,255,0.1); 
        }
        .site-logo { max-height: 40px; cursor: pointer; }

        /* NAV */
        .nav-container { margin-top: 85px; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .category-nav { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; }
        .category-nav a { background: #111; color: #fff; padding: 7px 15px; border-radius: 20px; text-decoration: none; font-size: 0.7rem; border: 1px solid #333; text-transform: uppercase; }
        .search-bar { width: 90%; max-width: 450px; padding: 10px 20px; border-radius: 25px; border: 1px solid #444; background: #000; color: #fff; outline: none; }

        /* SLIDER TOP */
        .main-slider { width: 96%; max-width: 1200px; height: 380px; margin: 20px auto; overflow: hidden; border-radius: 15px; position: relative; }
        .slider-track { display: flex; width: 100%; height: 100%; transition: transform 0.8s ease-in-out; }
        .slide { min-width: 100%; height: 100%; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }

        /* FILAS DE PELÍCULAS - SCROLL SUAVE */
        .category-section { margin-bottom: 30px; }
        h2 { font-family: 'Orbitron'; font-size: 1rem; margin-left: 4%; border-left: 4px solid var(--primary); padding-left: 10px; margin-bottom: 10px; }

        .carousel-wrapper { 
            width: 100%; overflow-x: auto; display: flex; 
            scrollbar-width: none; -ms-overflow-style: none;
            cursor: grab;
        }
        .carousel-wrapper::-webkit-scrollbar { display: none; }
        
        .movie-grid { display: flex; gap: 15px; padding: 10px 4%; }

        .card { 
            width: 180px; background: var(--card-bg); border-radius: 10px; 
            flex-shrink: 0; border: 1px solid #222; overflow: hidden;
            transition: transform 0.3s;
        }
        .card:hover { transform: scale(1.05); border-color: var(--cyber); }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; pointer-events: none; }
        .card span { display: block; padding: 8px; font-size: 0.75rem; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* MODAL */
        .player-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; }
        .close-btn { position: absolute; top: 20px; right: 20px; background: var(--primary); color: #fff; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-family: 'Orbitron'; z-index: 10001; }
        iframe { width: 100%; height: 100%; border: none; }

        @media (max-width: 600px) { .card { width: 140px; } .main-slider { height: 220px; } }
    </style>
</head>
<body>

<div id="loader">
    <div class="loader-content">
        <img src="https://i.postimg.cc/X7bmMQHY/logo.png" class="loader-logo">
        <div class="progress-box"><div class="progress-bar" id="pBar"></div></div>
    </div>
</div>

<header>
    <img src="https://i.postimg.cc/X7bmMQHY/logo.png" class="site-logo" onclick="window.scrollTo(0,0)">
</header>

<div class="nav-container">
    <div class="category-nav">
        <a href="#accion-sec">Acción</a><a href="#terror-sec">Terror</a><a href="#biopic-sec">Biopic</a>
        <a href="#drama-sec">Drama</a><a href="#comedia-sec">Comedia</a><a href="#series-sec">Series</a>
    </div>
    <input type="text" id="searchInput" class="search-bar" placeholder="Buscar..." onkeyup="filterCards()">
</div>

<div class="main-slider"><div class="slider-track" id="sliderTrack"></div></div>
<div id="content-container"></div>

<div id="videoPlayer" class="player-modal">
    <div class="close-btn" onclick="closePlayer()">CERRAR [X]</div>
    <iframe id="videoIframe" allowfullscreen></iframe>
</div>

<script>
    const categorias = ["accion", "terror", "biopic", "drama", "comedia", "series", "party-play"];
    let userInteracting = false;
    let interactionTimer;

    async function loadContent() {
        try {
            const res = await fetch('datos.json');
            const data = await res.json();
            const track = document.getElementById('sliderTrack');
            const container = document.getElementById('content-container');
            
            categorias.forEach(cat => {
                const section = document.createElement('div');
                section.className = 'category-section';
                section.id = `${cat}-sec`;
                section.style.display = 'none';
                section.innerHTML = `<h2>${cat.toUpperCase()}</h2><div class="carousel-wrapper" id="scroll-${cat}"><div class="movie-grid" id="${cat}-grid"></div></div>`;
                container.appendChild(section);
            });

            data.forEach(item => {
                const tipos = item.tipos || [item.tipo];
                if(tipos.includes('slider')) track.innerHTML += `<div class="slide"><img src="${item.img}"></div>`;
                tipos.forEach(t => {
                    const grid = document.getElementById(`${t}-grid`);
                    if(grid) {
                        document.getElementById(`${t}-sec`).style.display = 'block';
                        grid.innerHTML += `<div class="card" data-title="${item.titulo}" onclick="openPlayer('${item.url}', '${item.titulo}')"><img src="${item.img}"><span>${item.titulo}</span></div>`;
                    }
                });
            });

            startAutoScroll();
            startSlider();
            runLoader();
        } catch (e) { console.log(e); }
    }

    function runLoader() {
        let p = 0; const bar = document.getElementById('pBar');
        const int = setInterval(() => {
            p++; bar.style.width = p + "%";
            if(p >= 100) { clearInterval(int); document.getElementById('loader').classList.add('loader-hidden'); }
        }, 45);
    }

    function startAutoScroll() {
        const wrappers = document.querySelectorAll('.carousel-wrapper');
        
        wrappers.forEach(wrapper => {
            let scrollAmount = 0;
            let step = 0.6; // VELOCIDAD SUAVE (Bájalo más si quieres más lento, ej: 0.4)

            function stepScroll() {
                if (!userInteracting) {
                    wrapper.scrollLeft += step;
                    if (wrapper.scrollLeft >= (wrapper.scrollWidth - wrapper.clientWidth - 1)) {
                        wrapper.scrollLeft = 0;
                    }
                }
                requestAnimationFrame(stepScroll);
            }

            // Eventos para detectar si el usuario toca la pantalla
            const stopAuto = () => {
                userInteracting = true;
                clearTimeout(interactionTimer);
            };

            const resumeAuto = () => {
                interactionTimer = setTimeout(() => {
                    userInteracting = false;
                }, 2500); // Espera 2.5 segundos antes de volver a moverse solo
            };

            wrapper.addEventListener('touchstart', stopAuto);
            wrapper.addEventListener('touchend', resumeAuto);
            wrapper.addEventListener('mousedown', stopAuto);
            wrapper.addEventListener('mouseup', resumeAuto);
            wrapper.addEventListener('mouseleave', resumeAuto);

            requestAnimationFrame(stepScroll);
        });
    }

    function startSlider() {
        const track = document.getElementById('sliderTrack');
        let index = 0;
        setInterval(() => {
            const slides = document.querySelectorAll('.slide');
            if(slides.length > 0) {
                index = (index + 1) % slides.length;
                track.style.transform = `translateX(-${index * 100}%)`;
            }
        }, 5000);
    }

    function openPlayer(url, title) {
        document.getElementById('videoIframe').src = url;
        document.getElementById('videoPlayer').style.display = 'block';
    }

    function closePlayer() {
        document.getElementById('videoPlayer').style.display = 'none';
        document.getElementById('videoIframe').src = '';
    }

    function filterCards() {
        let input = document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('.card').forEach(card => {
            card.style.display = card.getAttribute('data-title').toLowerCase().includes(input) ? "block" : "none";
        });
    }

    window.onload = loadContent;
</script>
</body>
</html>
