<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PARTY PLAY | Streaming Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <style>
        :root {
            --primary: #ff2d75;
            --bg: #0a0a0b;
            --card-bg: #161618;
            --text: #ffffff;
        }

        [data-theme="light"] {
            --bg: #ffffff;
            --card-bg: #f0f0f0;
            --text: #1a1a1a;
        }

        html { scroll-behavior: smooth; }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Poppins', sans-serif;
            margin: 0; padding: 0; overflow-x: hidden;
            transition: background 0.3s;
        }

        /* --- ENTRADA LIMPIA --- */
        #intro {
            position: fixed; inset: 0; background: #000;
            display: flex; align-items: center; justify-content: center;
            z-index: 10000; transition: opacity 0.6s ease;
        }
        .intro-logo {
            font-family: 'Orbitron'; font-size: 2.5rem; color: var(--primary);
            letter-spacing: 5px; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.05); } }

        /* --- HEADER --- */
        header {
            height: 70px; padding: 0 5%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
            position: fixed; width: 100%; top: 0; z-index: 1000;
            display: flex; align-items: center; justify-content: space-between;
            box-sizing: border-box; border-bottom: 1px solid rgba(255,45,117,0.3);
        }
        .logo { font-family: 'Orbitron'; font-size: 1.4rem; color: var(--primary); text-decoration: none; font-weight: 900; }
        .theme-btn { background: none; border: none; color: var(--text); cursor: pointer; font-size: 1.2rem; }

        /* --- BUSCADOR CENTRAL (COMO TU EJEMPLO) --- */
        .search-container {
            text-align: center;
            margin-top: 110px; /* Debajo del header */
            margin-bottom: 20px;
            padding: 0 5%;
        }
        .search-bar {
            width: 90%; max-width: 550px;
            padding: 14px 25px; border-radius: 35px;
            border: 1px solid #333; background: #111; color: white;
            outline: none; font-size: 1rem; transition: 0.3s;
        }
        .search-bar:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(255, 45, 117, 0.4); }

        /* --- BANNER SLIDER (TAMAÑO PUBLICIDAD) --- */
        .banner-wrapper {
            width: 90%; max-width: 1100px; margin: 20px auto;
            border-radius: 12px; overflow: hidden;
            aspect-ratio: 16 / 6; background: #000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .main-slider img { width: 100%; height: 100%; object-fit: cover; }

        /* --- CONTENEDOR DE CARRUSELES --- */
        .main-content { padding: 20px 0 60px 5%; }
        
        .row-container { margin-bottom: 35px; }
        .row-title {
            font-family: 'Orbitron'; font-size: 1.1rem; color: var(--primary);
            margin-bottom: 15px; border-left: 4px solid var(--primary);
            padding-left: 12px; text-transform: uppercase;
        }

        .swiper-container { overflow: visible; }
        .card {
            background: var(--card-bg); border-radius: 10px; overflow: hidden;
            text-decoration: none; color: var(--text); display: block;
            transition: transform 0.3s; border: 1px solid rgba(255,255,255,0.05);
        }
        .card:hover { transform: scale(1.05); border-color: var(--primary); z-index: 10; }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }
        .card .title { padding: 8px; font-size: 0.8rem; text-align: center; font-weight: 600; display: block; 
                       white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            .logo { font-size: 1.1rem; }
            .search-bar { padding: 12px 20px; font-size: 0.9rem; }
            .banner-wrapper { width: 95%; aspect-ratio: 16 / 8; }
            .row-title { font-size: 0.9rem; }
        }

        .hidden { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div id="intro"><div class="intro-logo">PARTY PLAY</div></div>

    <header>
        <a href="#" class="logo">PARTY PLAY</a>
        <button class="theme-btn" onclick="toggleTheme()">🌓</button>
    </header>

    <div class="search-container">
        <input type="text" id="searchInput" class="search-bar" placeholder="Buscar películas o música..." onkeyup="filterAll()">
    </div>

    <div class="banner-wrapper">
        <div class="swiper main-slider" id="topSlider">
            <div class="swiper-wrapper" id="sliderItems"></div>
            <div class="swiper-pagination"></div>
        </div>
    </div>

    <main class="main-content" id="contentRows"></main>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        let moviesDB = [];

        window.onload = () => {
            setTimeout(() => document.getElementById('intro').style.opacity = '0', 1500);
            setTimeout(() => document.getElementById('intro').style.display = 'none', 2100);
            loadData();
        };

        function toggleTheme() {
            const theme = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', theme);
        }

        async function loadData() {
            try {
                const res = await fetch('datos.json');
                const data = await res.json();
                moviesDB = data;

                // 1. Cargar el Slider Superior
                const sliders = data.filter(i => i.tipo === 'slider');
                document.getElementById('sliderItems').innerHTML = sliders.map(s => `
                    <div class="swiper-slide"><img src="${s.img}"></div>
                `).join('');
                
                new Swiper('#topSlider', {
                    loop: true,
                    autoplay: { delay: 4000 },
                    pagination: { el: '.swiper-pagination', clickable: true },
                });

                // 2. Cargar todas las categorías
                renderCategories(data.filter(i => i.titulo && i.tipo !== 'slider'));
            } catch (e) { console.error("Error cargando JSON"); }
        }

        function renderCategories(items) {
            const container = document.getElementById('contentRows');
            container.innerHTML = '';

            // Obtener géneros (unificando etiquetas y tipos)
            const genres = [...new Set(items.flatMap(m => m.tipos || m.etiquetas || ["Varios"]))].sort();

            genres.forEach((genre, idx) => {
                const genreMovies = items.filter(m => (m.tipos || m.etiquetas || ["Varios"]).includes(genre));
                if(genreMovies.length === 0) return;

                const row = document.createElement('div');
                row.className = 'row-container';
                row.innerHTML = `
                    <h2 class="row-title">${genre}</h2>
                    <div class="swiper swiper-container" id="row-${idx}">
                        <div class="swiper-wrapper">
                            ${genreMovies.map(m => `
                                <div class="swiper-slide">
                                    <a href="${m.url}" class="card" data-title="${m.titulo}" target="_blank">
                                        <img src="${m.img}" loading="lazy">
                                        <span class="title">${m.titulo}</span>
                                    </a>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                container.appendChild(row);

                // Inicializar carrusel para esta categoría
                new Swiper(`#row-${idx}`, {
                    slidesPerView: 2.2,
                    spaceBetween: 15,
                    freeMode: true,
                    grabCursor: true,
                    autoplay: { delay: 5000 + (idx * 200), disableOnInteraction: false },
                    breakpoints: {
                        600: { slidesPerView: 3.5 },
                        1024: { slidesPerView: 5.5 },
                        1400: { slidesPerView: 7.5 }
                    }
                });
            });
        }

        function filterAll() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const cards = document.querySelectorAll('.card');
            cards.forEach(c => {
                const match = c.getAttribute('data-title').toLowerCase().includes(q);
                c.closest('.swiper-slide').style.display = match ? "block" : "none";
            });
        }
    </script>
</body>
</html>
